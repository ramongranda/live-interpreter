<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Live Interpreter</title>
<style>
  :root {
    --bg: #0e1116; --card: #161b22; --border: #2d333b;
    --teal: #2dd4bf; --green: #3fb950; --amber: #d29922; --red: #f85149;
    --fg: #e6edf3; --muted: #8b949e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
    font-family: Inter, system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--border); }
  header .title { font-weight: 600; }
  header .gear { color: var(--muted); cursor: pointer; }
  .banner { text-align: center; padding: 8px; font-weight: 600; border-radius: 8px; margin: 12px 16px; }
  .banner.ready { background: rgba(63,185,80,.15); color: var(--green); }
  .banner.err { background: rgba(248,81,73,.15); color: var(--red); }
  main { flex: 1; padding: 0 16px 16px; overflow: auto; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 22px; text-align: center; }
  .card h3 { margin: 8px 0 4px; }
  .card .sub { color: var(--muted); font-size: 13px; min-height: 18px; }
  button { background: var(--teal); color: #04201c; border: 0; border-radius: 8px;
    padding: 9px 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  button.danger { background: var(--red); color: #2a0a08; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .steps { max-width: 460px; margin: 16px auto; }
  .step { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .spinner { width: 64px; height: 64px; margin: 24px auto; border: 4px solid var(--border);
    border-top-color: var(--teal); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .console { display: grid; grid-template-columns: 1fr 1fr 160px; gap: 12px; }
  .lane h4 { color: var(--muted); font-size: 12px; letter-spacing: .04em; }
  .lane .col { max-height: 60vh; overflow: auto; }
  .bubble { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px; margin-bottom: 8px; font-size: 13px; }
  .bubble .tag { color: var(--muted); font-size: 10px; }
  .telemetry { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; font-size: 13px; }
  .telemetry .k { color: var(--muted); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
  .ok { background: rgba(63,185,80,.15); color: var(--green); }
  .dim { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <header>
    <span class="title">🎙 Live Interpreter</span>
    <span class="gear" title="Voice Studio">⚙</span>
  </header>
  <div id="banner" class="banner ready">SYSTEM READY</div>
  <main id="view"></main>

<script>
const $ = (id) => document.getElementById(id);
function stateName(cs) { return typeof cs === "string" ? cs : Object.keys(cs)[0]; }
function stateDetail(cs) { return typeof cs === "string" ? null : Object.values(cs)[0]; }
function initStatusText(st) {
  if (typeof st === "string") return st === "ok" ? "OK" : st === "pending" ? "Pendiente" : st;
  if ("running" in st) return st.running + "%";
  if ("failed" in st) return "Fallo";
  return "";
}
async function act(url) { await fetch(url, { method: "POST" }); tick(); }

let lastScreen = null;

function screenFor(st) {
  if (st === "active_server" || st === "active_client") return "active";
  if (st === "initializing") return "initializing";
  return "config"; // idle | preflight | error
}

function buildConfig(s, gpu) {
  const vram = `${(gpu.vram_free_mb/1024).toFixed(1)} GB libres / ${(gpu.vram_total_mb/1024).toFixed(0)} GB`;
  $("view").innerHTML = `
    <div class="cards">
      <div class="card">
        <div style="font-size:32px">🖥️➕🗄️</div>
        <h3>Activar Servidor Local</h3>
        <div class="sub" id="gpuSub">GPU: ${gpu.model_name||"—"} · ${vram}</div>
        <button id="srvStart">Start Server</button>
      </div>
      <div class="card">
        <div style="font-size:32px">🕸️</div>
        <h3>Conectar como Cliente</h3>
        <div class="sub">Buscando servidores en la malla…</div>
        <button id="cliStart">Connect to Mesh</button>
      </div>
    </div>
    <p class="dim">Voice Profile Settings →</p>`;
  $("cliStart").onclick = () => act("/api/client/start");
  $("srvStart").onclick = () => act("/api/server/start");
}

function buildInitializing() {
  $("view").innerHTML = `
    <div class="spinner"></div>
    <p style="text-align:center" class="dim">Cargando modelos locales…</p>
    <div class="steps" id="steps"></div>
    <div style="text-align:center"><button class="danger" onclick="act('/api/server/stop')">Cancelar operación</button></div>`;
}

function buildActive(st) {
  const mode = st === "active_server" ? "MODO: SERVIDOR GPU" : "MODO: CLIENTE";
  $("view").innerHTML = `
    <div class="console">
      <div class="lane"><h4>[INPUT: TU VOZ]</h4><div class="col" id="laneLocal"></div></div>
      <div class="lane"><h4>[OUTPUT: SU VOZ]</h4><div class="col" id="laneRemote"></div>
        <span class="badge ok" id="micBadge" style="display:none">LIVE-INTERPRETER-MIC-SOURCE ACTIVO</span></div>
      <div class="telemetry">
        <div class="dim">${mode}</div>
        <div><span class="k">GPU</span> <span id="tGpu">0</span>%</div>
        <div><span class="k">VRAM</span> <span id="tVram">—</span></div>
        <div><span class="k">Delay</span> <span id="tDelay">0</span> ms</div>
        <button class="danger" style="margin-top:16px" onclick="act('/api/server/stop')">Stop Interpretation</button>
      </div>
    </div>`;
  connectWs();
}

function render(s) {
  const st = stateName(s.current_state);
  const gpu = s.gpu || {};
  const banner = $("banner");
  const screen = screenFor(st);
  banner.style.display = screen === "config" ? "block" : "none";
  if (st === "error") { banner.className = "banner err"; banner.textContent = stateDetail(s.current_state); banner.style.display = "block"; }
  else if (screen === "config") { banner.className = "banner ready"; banner.textContent = "SYSTEM READY"; }

  if (screen !== lastScreen) {
    if (screen === "config") buildConfig(s, gpu);
    else if (screen === "initializing") buildInitializing();
    else buildActive(st);
    lastScreen = screen;
  }

  // In-place dynamic updates (don't wipe bubbles).
  if (screen === "config") {
    const btn = $("srvStart");
    if (btn) { btn.disabled = !gpu.is_capable; btn.title = gpu.gate_message || ""; }
    const sub = $("gpuSub");
    if (sub) sub.textContent = `GPU: ${gpu.model_name||"—"} · ${(gpu.vram_free_mb/1024).toFixed(1)} GB libres / ${(gpu.vram_total_mb/1024).toFixed(0)} GB`;
  } else if (screen === "initializing") {
    const steps = stateDetail(s.current_state) || [];
    $("steps").innerHTML = steps.map(x => `<div class="step"><span>${x.label}</span>
      <span>[${initStatusText(x.status)}${x.elapsed_ms?`, ${(x.elapsed_ms/1000).toFixed(1)}s`:""}]</span></div>`).join("");
  } else {
    $("tGpu").textContent = gpu.utilization_pct||0;
    $("tVram").textContent = `${(gpu.vram_free_mb/1024).toFixed(1)}/${(gpu.vram_total_mb/1024).toFixed(0)} GB`;
    if (s.health?.virtual_mic?.state === "ready") $("micBadge").style.display = "inline-block";
  }
}

// --- live console bubbles via WS (EventEnvelope JSON) ---
let ws = null;
function bubble(laneId, tag, text) {
  const col = $(laneId); if (!col) return;
  const b = document.createElement("div"); b.className = "bubble";
  b.innerHTML = `<div class="tag">${tag}</div>${text}`;
  col.appendChild(b); col.scrollTop = col.scrollHeight;
}
function connectWs() {
  if (ws && ws.readyState <= 1) return;
  try {
    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onmessage = (m) => {
      let env; try { env = JSON.parse(m.data); } catch { return; }
      const e = env.event || env;
      const kind = e.kind || stateName(e);
      const laneId = (e.lane === "remote") ? "laneRemote" : "laneLocal";
      if (kind === "transcript") bubble(laneId, e.lang?.toUpperCase()||"", e.text);
      else if (kind === "translation") bubble(laneId, (e.lang?.toUpperCase()||"")+" 🔊", e.text);
      else if (kind === "done" && $("tDelay")) $("tDelay").textContent = e.latency_ms || 0;
    };
  } catch {}
}

async function tick() {
  try { const s = await (await fetch("/api/status")).json(); render(s); }
  catch (e) { /* keep last screen; WS may still feed bubbles */ }
}
setInterval(tick, 2000); tick();
</script>
</body>
</html>
