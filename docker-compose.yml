services:
  olares-voice-translator:
    build: .
    container_name: olares-voice-translator
    restart: unless-stopped
    network_mode: host
    environment:
      OVT_BIND: 127.0.0.1:8787
      OVT_DATA_DIR: /app/data
      OVT_WHISPER_MODEL: /app/data/models/ggml-large-v3-turbo.bin
      OVT_OLLAMA_URL: http://127.0.0.1:11434
      OVT_OLLAMA_MODEL: translator:latest
      OVT_QWEN_TTS_URL: http://127.0.0.1:8020
      OVT_QWEN_TTS_MODEL: Qwen/Qwen3-TTS-12Hz-0.6B-Base
    volumes:
      - ./data:/app/data
